<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Vi — Dia dos Namorados</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: #faf7f3; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; font-family: 'Jost', sans-serif; }
  .card-wrap { perspective: 1000px; width: 100%; max-width: 360px; }
  .card { background: #fff; border-radius: 4px; box-shadow: 0 4px 32px rgba(44,95,122,0.10); padding: 48px 40px 40px; position: relative; animation: fadeUp 0.8s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .card-line { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: #111111; line-height: 1.75; opacity: 0; animation: revealLine 0.6s ease forwards; }
  .card-line:nth-child(1) { animation-delay: 0.5s; }
  .card-line:nth-child(2) { animation-delay: 1.1s; }
  @keyframes revealLine { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .icon { display: block; text-align: center; font-size: 22px; margin-top: 32px; opacity: 0; animation: revealLine 0.6s ease 1.7s forwards; }
  .divider { width: 32px; height: 1px; background: #C4A882; margin: 28px auto 0; opacity: 0; animation: revealLine 0.6s ease 2.0s forwards; }
  .footer { margin-top: 16px; text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 12px; color: #C4A882; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0; animation: revealLine 0.6s ease 2.2s forwards; }
  .back-btn { margin-top: 36px; font-size: 12px; color: #C4A882; text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; display: inline-block; opacity: 0; animation: revealLine 0.6s ease 2.5s forwards; transition: color 0.3s; }
  .back-btn:hover { color: #2C5F7A; }
</style>
</head>
<body>
  <div class="card-wrap">
    <div class="card">
      <p class="card-line">Não preciso de um dia específico para te amar,</p>
      <p class="card-line">mas adoro ter uma desculpa para dizer ao mundo o quanto você é especial.</p>
      <span class="icon">✨</span>
      <div class="divider"></div>
      <p class="footer">Te Vi</p>
    </div>
  </div>
  <a class="back-btn" href="envelope-dia-dos-namorados-7.html">← fechar carta</a>
</body>
</html>
