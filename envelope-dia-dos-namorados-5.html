<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Vi — Dia dos Namorados</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: #faf7f3; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Jost', sans-serif; }
  .scene { perspective: 1000px; cursor: pointer; }
  .envelope { width: 320px; height: 220px; position: relative; transform-style: preserve-3d; transition: transform 0.6s ease; }
  .envelope:hover { transform: scale(1.03); }
  .env-body { width: 100%; height: 100%; background: #2C5F7A; border-radius: 4px; position: absolute; display: flex; align-items: center; justify-content: center; }
  .env-flap { position: absolute; top: 0; left: 0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 110px solid #245270; transform-origin: top center; transition: transform 0.5s ease 0.2s; z-index: 2; }
  .scene:hover .env-flap { transform: rotateX(-160deg); }
  .env-fold-bottom { position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-bottom: 95px solid #1e4a61; }
  .env-fold-left { position: absolute; top: 0; left: 0; width: 0; height: 0; border-top: 110px solid transparent; border-bottom: 110px solid transparent; border-left: 120px solid #245270; }
  .env-fold-right { position: absolute; top: 0; right: 0; width: 0; height: 0; border-top: 110px solid transparent; border-bottom: 110px solid transparent; border-right: 120px solid #245270; }
  .card-peek { width: 260px; height: 140px; background: #faf7f3; border-radius: 3px; position: absolute; top: 30px; left: 30px; display: flex; align-items: center; justify-content: center; z-index: 1; transition: transform 0.5s ease 0.1s; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .scene:hover .card-peek { transform: translateY(-30px); }
  .card-peek-text { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: #2C5F7A; text-align: center; padding: 16px; line-height: 1.6; font-style: italic; }
  .hint { margin-top: 28px; font-size: 12px; color: #C4A882; letter-spacing: 0.08em; text-transform: uppercase; }
  .open-btn { margin-top: 24px; padding: 12px 36px; background: #2C5F7A; color: #faf7f3; border: none; border-radius: 2px; font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.3s; }
  .open-btn:hover { background: #245270; }
  .logo { margin-top: 40px; font-family: 'Cormorant Garamond', serif; font-size: 13px; color: #C4A882; letter-spacing: 0.15em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="scene">
    <div class="envelope">
      <div class="env-body">
        <div class="env-fold-left"></div>
        <div class="env-fold-right"></div>
        <div class="env-fold-bottom"></div>
        <div class="card-peek">
          <p class="card-peek-text">Entre todas as certezas<br>que eu poderia ter...</p>
        </div>
        <div class="env-flap"></div>
      </div>
    </div>
  </div>
  <p class="hint">Toque para abrir</p>
  <a class="open-btn" href="carta-dia-dos-namorados-5.html">Abrir carta</a>
  <p class="logo">Te Vi</p>
</body>
</html>
